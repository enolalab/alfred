# Alfred example configuration using OpenRouter as the LLM provider.
# This is a production-like baseline that can be adapted for staging or production.
# Expected secret sources:
# - OPENROUTER_API_KEY from secret manager
# - TELEGRAM_BOT_TOKEN from secret manager
# - kube credentials mounted per profile when using ex_cluster
# - Prometheus bearer tokens sourced from secret manager if required

llm:
  provider: openrouter
  api_key: "${OPENROUTER_API_KEY}"
  base_url: ""
  model: openai/gpt-4o-mini

agent:
  name: Alfred
  system_prompt: |
    You are Alfred, a read-only Kubernetes incident investigator.
    Be concise, evidence-first, and never claim to have changed the cluster.
  max_tokens: 4096
  temperature: 0.2
  max_turns: 8

tools:
  shell:
    enabled: false
    enabled_in: [chat, serve]
    allowlist: []
    denylist: [rm, mkfs, dd, shutdown, reboot]
    require_confirmation: true
  read_file:
    enabled: false
    enabled_in: [chat, serve]
    root_dir: .
    max_bytes: 16384
  kubernetes:
    enabled: true
    enabled_in: [serve]
    mode: ex_cluster
    default_cluster: prod-ap
    kubeconfig_path: ""
    context: ""
    namespace_allowlist: [payments]
    max_pods: 20
    max_events: 30
    max_log_lines: 200
    max_log_bytes: 16384
    log_since: 15m
  prometheus:
    enabled: true
    enabled_in: [serve]
    mode: ex_cluster
    base_url: https://prometheus.prod-ap.example.com
    bearer_token: "${PROMETHEUS_TOKEN_PROD_AP}"
    default_cluster: prod-ap
    timeout: 10s
    max_series: 10
    max_samples: 120
    default_step: 1m
    default_lookback: 15m
    circuit_break_threshold: 5
    circuit_break_cooldown: 30s

storage:
  backend: redis
  redis:
    addr: redis.alfred.svc:6379
    username: ""
    password: "${REDIS_PASSWORD}"
    db: 0
    key_prefix: alfred
    conversation_ttl: 24h
    incident_ttl: 24h

reliability:
  alertmanager:
    dedupe_enabled: true
    dedupe_ttl: 5m
    rate_limit_enabled: true
    rate_limit_window: 1m
    rate_limit_max_events: 60

clusters:
  - name: prod-ap
    kubernetes:
      mode: ex_cluster
      kubeconfig_path: /etc/alfred/kubeconfigs/prod-ap.kubeconfig
      context: prod-ap
      namespace_allowlist: [payments, checkout]
    prometheus:
      mode: ex_cluster
      base_url: https://prometheus.prod-ap.example.com
      bearer_token: "${PROMETHEUS_TOKEN_PROD_AP}"

security:
  audit:
    enabled: true
    path: /var/log/alfred/audit.jsonl

telegram:
  enabled: true
  bot_token: "${TELEGRAM_BOT_TOKEN}"
  api_base_url: ""
  timeout: 10s
  max_attempts: 3
  base_backoff: 200ms
  circuit_break_threshold: 5
  circuit_break_cooldown: 30s

alertmanager:
  enabled: true
  agent_id: ""
  telegram_chat_id: "-1000000000000"

gateway:
  enabled: true
  addr: ":8080"
  read_timeout: 30s
  write_timeout: 60s
  shutdown_timeout: 30s
  queue:
    size: 200
    workers: 5
  session:
    ttl: 2h
    cleanup_interval: 10m
  heartbeat:
    enabled: false
    file_path: HEARTBEAT.md
    interval: 30m
    agent_id: ""

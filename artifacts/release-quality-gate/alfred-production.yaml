apiVersion: v1
kind: ServiceAccount
metadata:
  labels:
    app.kubernetes.io/environment: production
    app.kubernetes.io/name: alfred
  name: alfred
  namespace: alfred
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/environment: production
    app.kubernetes.io/name: alfred
  name: alfred-readonly
rules:
- apiGroups:
  - ""
  resources:
  - pods
  - pods/log
  - events
  - namespaces
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - apps
  resources:
  - deployments
  - replicasets
  - statefulsets
  - daemonsets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - services
  verbs:
  - get
  - list
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  labels:
    app.kubernetes.io/environment: production
    app.kubernetes.io/name: alfred
  name: alfred-readonly
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: alfred-readonly
subjects:
- kind: ServiceAccount
  name: alfred
  namespace: alfred
---
apiVersion: v1
data:
  config.yml: |
    # Alfred production example configuration
    # Expected secret sources:
    # - ANTHROPIC_API_KEY from secret manager
    # - TELEGRAM_BOT_TOKEN from secret manager
    # - kube credentials mounted per profile when using ex_cluster
    # - Prometheus bearer tokens sourced from secret manager if required
    #
    # Alertmanager must send labels.cluster values that exactly match the names below.

    llm:
      provider: anthropic
      api_key: "${ANTHROPIC_API_KEY}"
      model: claude-sonnet-4-20250514

    agent:
      name: Alfred
      system_prompt: |
        You are Alfred, a read-only Kubernetes incident investigator for production.
        Be concise, evidence-first, and never claim to have changed the cluster.
      max_tokens: 4096
      temperature: 0.2
      max_turns: 8

    tools:
      shell:
        enabled: false
        enabled_in: [chat, serve]
        allowlist: []
        denylist: [rm, mkfs, dd, shutdown, reboot]
        require_confirmation: true
      read_file:
        enabled: false
        enabled_in: [chat, serve]
        root_dir: .
        max_bytes: 16384
      kubernetes:
        enabled: true
        enabled_in: [serve]
        mode: ex_cluster
        default_cluster: prod-ap
        kubeconfig_path: ""
        context: ""
        namespace_allowlist: [payments]
        max_pods: 20
        max_events: 30
        max_log_lines: 200
        max_log_bytes: 16384
        log_since: 15m
      prometheus:
        enabled: true
        enabled_in: [serve]
        mode: ex_cluster
        base_url: https://prometheus.prod-ap.example.com
        bearer_token: "${PROMETHEUS_TOKEN_PROD_AP}"
        default_cluster: prod-ap
        timeout: 10s
        max_series: 10
        max_samples: 120
        default_step: 1m
        default_lookback: 15m

    storage:
      backend: redis
      redis:
        addr: redis.alfred.svc:6379
        username: ""
        password: "${REDIS_PASSWORD}"
        db: 0
        key_prefix: alfred
        conversation_ttl: 24h
        incident_ttl: 24h

    reliability:
      alertmanager:
        dedupe_enabled: true
        dedupe_ttl: 5m

    clusters:
      - name: prod-ap
        kubernetes:
          mode: ex_cluster
          kubeconfig_path: /etc/alfred/kubeconfigs/prod-ap.kubeconfig
          context: prod-ap
          namespace_allowlist: [payments, checkout]
        prometheus:
          mode: ex_cluster
          base_url: https://prometheus.prod-ap.example.com
          bearer_token: "${PROMETHEUS_TOKEN_PROD_AP}"
      - name: prod-eu
        kubernetes:
          mode: ex_cluster
          kubeconfig_path: /etc/alfred/kubeconfigs/prod-eu.kubeconfig
          context: prod-eu
          namespace_allowlist: [payments, checkout]
        prometheus:
          mode: ex_cluster
          base_url: https://prometheus.prod-eu.example.com
          bearer_token: "${PROMETHEUS_TOKEN_PROD_EU}"

    security:
      audit:
        enabled: true
        path: /var/log/alfred/audit.jsonl

    telegram:
      enabled: true
      bot_token: "${TELEGRAM_BOT_TOKEN}"
      timeout: 10s
      max_attempts: 3
      base_backoff: 200ms

    alertmanager:
      enabled: true
      agent_id: ""
      telegram_chat_id: "-1000000000000"

    gateway:
      enabled: true
      addr: ":8080"
      read_timeout: 30s
      write_timeout: 60s
      shutdown_timeout: 30s
      queue:
        size: 200
        workers: 5
      session:
        ttl: 2h
        cleanup_interval: 10m
      heartbeat:
        enabled: false
        file_path: HEARTBEAT.md
        interval: 30m
        agent_id: ""
kind: ConfigMap
metadata:
  labels:
    app.kubernetes.io/environment: production
  name: alfred-config
  namespace: alfred
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/environment: production
    app.kubernetes.io/name: alfred
  name: alfred
  namespace: alfred
spec:
  ports:
  - name: http
    port: 8080
    targetPort: http
  selector:
    app.kubernetes.io/name: alfred
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/environment: production
    app.kubernetes.io/name: alfred
  name: alfred
  namespace: alfred
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: alfred
  template:
    metadata:
      labels:
        app.kubernetes.io/name: alfred
    spec:
      containers:
      - args:
        - serve
        env:
        - name: ALFRED_CONFIG
          value: /etc/alfred/config.yml
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              key: ANTHROPIC_API_KEY
              name: alfred-secrets
        - name: TELEGRAM_BOT_TOKEN
          valueFrom:
            secretKeyRef:
              key: TELEGRAM_BOT_TOKEN
              name: alfred-secrets
        image: ghcr.io/enolalab/alfred:latest
        imagePullPolicy: IfNotPresent
        livenessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 10
          periodSeconds: 20
        name: alfred
        ports:
        - containerPort: 8080
          name: http
        readinessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
        volumeMounts:
        - mountPath: /etc/alfred
          name: config
          readOnly: true
      serviceAccountName: alfred
      volumes:
      - configMap:
          items:
          - key: config.yml
            path: config.yml
          name: alfred-config
        name: config

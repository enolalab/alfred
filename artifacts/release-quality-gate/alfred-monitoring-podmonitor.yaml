apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  labels:
    app.kubernetes.io/name: alfred
    app.kubernetes.io/part-of: alfred
    release: kube-prometheus-stack
  name: alfred
  namespace: monitoring
spec:
  jobLabel: app.kubernetes.io/name
  namespaceSelector:
    matchNames:
    - alfred
  podMetricsEndpoints:
  - honorLabels: true
    interval: 30s
    path: /metrics
    port: http
    scrapeTimeout: 10s
  selector:
    matchLabels:
      app.kubernetes.io/name: alfred
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  labels:
    app.kubernetes.io/name: alfred
    app.kubernetes.io/part-of: alfred
    release: kube-prometheus-stack
  name: alfred
  namespace: monitoring
spec:
  groups:
  - name: alfred-runtime
    rules:
    - alert: AlfredTargetDown
      annotations:
        summary: Alfred metrics target is down
      expr: up{job="alfred"} == 0
      for: 2m
      labels:
        severity: critical
    - alert: AlfredTelegramDeliveryFailures
      annotations:
        summary: Alfred Telegram delivery failures detected in the last 5 minutes
      expr: increase(alfred_telegram_send_failures_total[5m]) > 0
      for: 5m
      labels:
        severity: warning
    - alert: AlfredInvestigationFailures
      annotations:
        summary: Alfred investigation failures detected in the last 10 minutes
      expr: increase(alfred_investigations_failed_total[10m]) > 0
      for: 10m
      labels:
        severity: warning
    - alert: AlfredQueuePressure
      annotations:
        summary: Alfred queue depth is elevated
      expr: alfred_queue_depth > 50
      for: 5m
      labels:
        severity: warning
    - alert: AlfredInvestigationLatencyHigh
      annotations:
        summary: Alfred investigation latency average is elevated
      expr: alfred_investigation_duration_ms_average_ms > 10000
      for: 10m
      labels:
        severity: warning
    - alert: AlfredToolLatencyHigh
      annotations:
        summary: Alfred tool call latency average is elevated
      expr: alfred_tool_call_latency_ms_average_ms > 3000
      for: 10m
      labels:
        severity: warning

name: Release Readiness

on:
  workflow_dispatch:
    inputs:
      signoff_path:
        description: Repository path to a real release sign-off file under docs/release-signoffs/
        required: true

jobs:
  release-readiness:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Run release quality gate baseline
        run: bash scripts/release_quality_gate.sh

      - name: Validate release sign-off
        run: bash scripts/validate_release_signoff.sh "${{ inputs.signoff_path }}"

      - name: Upload release quality gate artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-quality-gate-artifacts
          path: artifacts/release-quality-gate/

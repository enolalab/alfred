name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  release-quality-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Run release quality gate baseline
        run: bash scripts/release_quality_gate.sh

      - name: Upload release quality gate artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-quality-gate-artifacts
          path: artifacts/release-quality-gate/

apiVersion: apps/v1
kind: Deployment
metadata:
  name: alfred
  namespace: alfred
  labels:
    app.kubernetes.io/name: alfred
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: alfred
  template:
    metadata:
      labels:
        app.kubernetes.io/name: alfred
    spec:
      serviceAccountName: alfred
      containers:
        - name: alfred
          image: ghcr.io/enolalab/alfred:latest
          imagePullPolicy: IfNotPresent
          args: ["serve"]
          env:
            - name: ALFRED_CONFIG
              value: /etc/alfred/config.yml
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: alfred-secrets
                  key: ANTHROPIC_API_KEY
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: alfred-secrets
                  key: TELEGRAM_BOT_TOKEN
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          volumeMounts:
            - name: config
              mountPath: /etc/alfred
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: alfred-config
            items:
              - key: config.yml
                path: config.yml


apiVersion: v1
kind: ServiceAccount
metadata:
  name: alfred
  namespace: alfred-lab
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: alfred-readonly-lab
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: alfred-readonly-lab
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: alfred-readonly-lab
subjects:
  - kind: ServiceAccount
    name: alfred
    namespace: alfred-lab

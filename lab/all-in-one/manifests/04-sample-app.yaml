apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments-api
  namespace: alfred-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payments-api
  template:
    metadata:
      labels:
        app: payments-api
    spec:
      containers:
        - name: payments-api
          image: hashicorp/http-echo:1.0.0
          args:
            - "-text=payments ok"
          ports:
            - containerPort: 5678
---
apiVersion: v1
kind: Service
metadata:
  name: payments-api
  namespace: alfred-lab
spec:
  selector:
    app: payments-api
  ports:
    - port: 8080
      targetPort: 5678

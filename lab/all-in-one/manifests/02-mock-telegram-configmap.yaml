apiVersion: v1
kind: ConfigMap
metadata:
  name: mock-telegram-api
  namespace: alfred-lab
data:
  mock-telegram.py: |
    import json
    import time
    from http.server import BaseHTTPRequestHandler, HTTPServer

    mode = {"value": "ok"}
    history = []

    class Handler(BaseHTTPRequestHandler):
        def _write(self, status, payload):
            self.send_response(status)
            self.send_header("Content-Type", "application/json")
            self.end_headers()
            self.wfile.write(json.dumps(payload).encode())

        def do_GET(self):
            if self.path == "/_history":
                self._write(200, history)
                return
            self._write(404, {"error": "not found"})

        def do_POST(self):
            length = int(self.headers.get("Content-Length", "0"))
            body = self.rfile.read(length).decode() if length else ""
            if self.path.startswith("/_mode/"):
                mode["value"] = self.path.split("/_mode/", 1)[1]
                self._write(200, {"mode": mode["value"]})
                return
            if mode["value"] == "timeout":
                time.sleep(30)
            if mode["value"] == "5xx":
                self._write(502, {"ok": False, "description": "temporary failure"})
                return
            history.append({"path": self.path, "body": body})
            self._write(200, {"ok": True, "result": {"message_id": len(history)}})

    HTTPServer(("0.0.0.0", 8081), Handler).serve_forever()
